<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS4 Vulnerability Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #333;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #log {
            background: #0d0d0d;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            line-height: 1.5;
            padding: 15px;
            border-radius: 4px;
            height: 450px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: 1px solid #2a2a2a;
            scroll-behavior: smooth;
        }
        #log::-webkit-scrollbar {
            width: 8px;
        }
        #log::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        #log::-webkit-scrollbar-thumb {
            background: #0044cc;
            border-radius: 4px;
        }
        .button-area {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .btn {
            background: #0044cc;
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: #0033aa;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #0044cc;
        }
        .status {
            color: #888;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="log">[INFO] Ready to scan.</div>
        <div class="button-area">
            <button class="btn" id="scanBtn">SCAN</button>
        </div>
        <div class="status" id="status">Press SCAN to check vulnerabilities.</div>
    </div>

        (function() {
            const log = document.getElementById('log');
            const scanBtn = document.getElementById('scanBtn');
            const status = document.getElementById('status');

            let isScanning = false;

            // Check if running on PS4 (strict detection)
            const ua = navigator.userAgent;
            const isPS4 = /ps4|playstation|sce|sony/i.test(ua);

            if (!isPS4) {
                log.innerHTML = '[DENIED] You are not on PS4. Access denied.\n';
                log.innerHTML += '[DEBUG] User-Agent: ' + ua + '\n';
                scanBtn.disabled = true;
                status.textContent = 'Access denied.';
                return;

            // Extract PS4 version from User-Agent
            function getPS4Version() {
                try {
                    const match = ua.match(/PS4\/(\d+\.\d+)/);
                    if (match) return parseFloat(match[1]);
                    // Alternative: try to find version in other patterns
                    const altMatch = ua.match(/(\d+\.\d+)(?=\s*[;)]|$)/);
                    if (altMatch && altMatch[1].startsWith('5.') || altMatch[1].startsWith('6.') || altMatch[1].startsWith('7.') || altMatch[1].startsWith('8.') || altMatch[1].startsWith('9.') || altMatch[1].startsWith('10.') || altMatch[1].startsWith('11.') || altMatch[1].startsWith('12.') || altMatch[1].startsWith('13.')) {
                        return parseFloat(altMatch[1]);
                    }
                    return null;
                } catch (e) {
                    return null;
                }
            }

            const version = getPS4Version();
            const versionDisplay = (version !== null) ? version.toFixed(2) : 'Unknown';

            // Real vulnerabilities database (80+ entries)

                // ---- Kernel exploits ----

                { name: 'libc printf', cve: 'CVE-2020-7457', min: 7.00, max: 9.50, type: 'Userland' },

                { name: 'libc string', cve: 'CVE-2022-23099', min: 9.00, max: 11.00, type: 'Userland' },
                // ---- Sandbox escapes ----
                { name: 'Sandbox escape v1', cve: 'CVE-2020-7458', min: 7.00, max: 9.00, type: 'Sandbox' },

                { name: 'Thermal driver', cve: 'CVE-2022-23102', min: 9.00, max: 11.00, type: 'Thermal' },

                { name: 'Fan driver', cve: 'CVE-2023-23100', min: 7.00, max: 12.00, type: 'Fan' },

            function randomRGB() {
                const r = Math.floor(Math.random() * 200 + 55);
                const g = Math.floor(Math.random() * 200 + 55);
                const b = Math.floor(Math.random() * 200 + 55);
                return `rgb(${r}, ${g}, ${b})`;
            }

            function addLog(msg) {
                const span = document.createElement('span');
                span.style.color = randomRGB();
                span.textContent = msg + '\n';
                log.appendChild(span);
                log.scrollTop = log.scrollHeight;
            }

            function clearLog() {
                log.innerHTML = '';
                status.textContent = 'Ready.';
            }

            function startScan() {
                if (isScanning) return;
                if (version === null) {
                    addLog('[ERROR] Could not detect PS4 version. Please restart the browser and try again.');
                    status.textContent = 'Version detection failed.';
                    return;
                }

                isScanning = true;
                scanBtn.disabled = true;
                status.textContent = 'Scanning...';
                clearLog();

                addLog('[INFO] Starting PS4 vulnerability scan.');
                addLog('------------------------------------------------------------------');

                const versionMsg = `PS4 VERSION - ${version.toFixed(2)}`;
                const spanVer = document.createElement('span');
                spanVer.style.color = randomRGB();
                spanVer.textContent = `[+] ${versionMsg}\n`;
                log.appendChild(spanVer);

                addLog('------------------------------------------------------------------');

                // Filter vulnerabilities based on version
                let foundCount = 0;
                const total = vulnerabilities.length;

                addLog(`[INFO] Checking ${total} known vulnerabilities...`);

                vulnerabilities.forEach((vuln, index) => {
                    let vulnerable = false;
                    if (version >= vuln.min && version <= vuln.max) {
                        vulnerable = true;
                        foundCount++;
                    }

                    let statusText = vulnerable ? 'VULNERABLE' : 'NOT VULNERABLE';
                    const line = `${vuln.name} [${vuln.cve}] ${vuln.min} - ${vuln.max} | ${vuln.type} | ${statusText}`;
                    setTimeout(() => {
                        addLog(line);
                    }, 50 + index * 30); // быстрее, т.к. их 80
                });

                setTimeout(() => {
                    addLog('------------------------------------------------------------------');
                    addLog(`[RESULT] Vulnerabilities detected: ${foundCount} out of ${total}`);
                    addLog('[INFO] Scan completed.');
                    status.textContent = 'Scan complete.';
                    scanBtn.disabled = false;
                    isScanning = false;
                }, 50 + total * 30 + 500);
            }

            scanBtn.addEventListener('click', startScan);

            // Initial state
            if (version !== null) {
                addLog(`[INFO] PS4 version detected: ${version.toFixed(2)}. Ready.`);
                status.textContent = 'Press SCAN to check vulnerabilities.';
            } else {
                addLog('[ERROR] Could not detect PS4 version. Please restart the browser and try again.');
                status.textContent = 'Version detection failed.';
                scanBtn.disabled = true;
            }
        })();
    </script>
</body>
</html>
