<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS4 Vulnerability Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 950px;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #333;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #log {
            background: #0d0d0d;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            line-height: 1.5;
            padding: 15px;
            border-radius: 4px;
            height: 450px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: 1px solid #2a2a2a;
            scroll-behavior: smooth;
        }
        #log::-webkit-scrollbar {
            width: 8px;
        }
        #log::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        #log::-webkit-scrollbar-thumb {
            background: #0044cc;
            border-radius: 4px;
        }
        @keyframes rainbow {
            0% { color: #ff0000; }
            16% { color: #ff8800; }
            33% { color: #ffff00; }
            50% { color: #00ff00; }
            66% { color: #0088ff; }
            83% { color: #8800ff; }
            100% { color: #ff0000; }
        }
        .rainbow-text {
            animation: rainbow 3s linear infinite;
        }
        .button-area {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .btn {
            background: #0044cc;
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: #0033aa;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #0044cc;
        }
        .status {
            color: #888;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Эмуляция уведомления (fallback, если Notification API не работает) */
        .ps4-notification {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.92);
            border-left: 6px solid #0044cc;
            color: #fff;
            padding: 18px 28px;
            border-radius: 6px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.9);
            z-index: 9999;
            opacity: 0;
            transform: translateX(80px) scale(0.95);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .ps4-notification.show {
            opacity: 1;
            transform: translateX(0) scale(1);
            pointer-events: auto;
        }
        .ps4-notification .title {
            font-weight: bold;
            color: #00ccff;
            font-size: 18px;
            margin-bottom: 6px;
        }
        .ps4-notification .message {
            color: #eee;
            font-size: 15px;
        }
        .ps4-notification .sub {
            color: #aaa;
            font-size: 12px;
            margin-top: 6px;
            border-top: 1px solid #333;
            padding-top: 6px;
        }
    </style>
</head>

        <div class="status" id="status">Press SCAN to check vulnerabilities.</div>

        <div class="message" id="notifMessage">Scan complete.</div>
        <div class="sub">Press X to dismiss</div>

                try {
                    const match = ua.match(/PS4\/(\d+\.\d+)/);

                    const altMatch = ua.match(/(\d+\.\d+)(?=\s*[;)]|$)/);
                    if (altMatch && /^[5-9]|^1[0-3]/.test(altMatch[1])) {
                        return parseFloat(altMatch[1]);
                    }
                    return null;
                } catch (e) {
                    return null;
                }
            }

            const versionDisplay = (version !== null) ? version.toFixed(2) : 'Unknown';

                const uaLower = ua.toLowerCase();
                if (uaLower.includes('pro')) return 'Pro';

            // Функция для добавления радужного текста
            function addLog(msg) {
                const span = document.createElement('span');
                span.className = 'rainbow-text';
                span.textContent = msg + '\n';
                log.appendChild(span);
                log.scrollTop = log.scrollHeight;
            }

            function clearLog() {
                log.innerHTML = '';
                status.textContent = 'Ready.';
            }

            // Функция для показа системного уведомления через Notification API
            function showSystemNotification(message) {
                // Проверяем поддержку Notification API
                if (!('Notification' in window)) {
                    // Fallback - эмуляция
                    notifMessage.textContent = message;
                    notification.classList.add('show');
                    setTimeout(() => {
                        notification.classList.remove('show');
                    }, 8000);
                    return;
                }

                // Запрашиваем разрешение, если ещё не было
                if (Notification.permission === 'granted') {
                    new Notification('PS4 System Alert', {
                        body: message,
                        icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%230044cc"/%3E%3Ctext x="20" y="60" font-size="40" fill="white" font-family="Arial"%3EPS4%3C/text%3E%3C/svg%3E',
                        silent: false,
                        tag: 'ps4-scan'
                    });
                } else if (Notification.permission === 'default') {
                    Notification.requestPermission().then(perm => {
                        if (perm === 'granted') {
                            new Notification('PS4 System Alert', {
                                body: message,
                                icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%230044cc"/%3E%3Ctext x="20" y="60" font-size="40" fill="white" font-family="Arial"%3EPS4%3C/text%3E%3C/svg%3E',
                                silent: false,
                                tag: 'ps4-scan'
                            });
                        } else {
                            // Если отказано, показываем эмуляцию
                            notifMessage.textContent = message;
                            notification.classList.add('show');
                            setTimeout(() => {
                                notification.classList.remove('show');
                            }, 8000);
                        }
                    });
                } else {
                    // Если заблокировано, показываем эмуляцию
                    notifMessage.textContent = message;
                    notification.classList.add('show');
                    setTimeout(() => {
                        notification.classList.remove('show');
                    }, 8000);
                }
            }

            // Основная функция сканирования
            function startScan() {
                if (isScanning) return;
                if (version === null) {
                    addLog('[ERROR] Could not detect PS4 version. Please restart the browser and try again.');
                    status.textContent = 'Version detection failed.';
                    return;
                }

                isScanning = true;
                scanBtn.disabled = true;
                status.textContent = 'Scanning...';
                clearLog();

                addLog('[INFO] Starting PS4 vulnerability scan.');
                addLog('------------------------------------------------------------------');

                const versionMsg = `PS4 VERSION - ${version.toFixed(2)}`;
                const modelMsg = `MODEL - ${model}`;
                addLog(`[+] ${versionMsg}`);
                addLog(`[+] ${modelMsg}`);
                addLog('------------------------------------------------------------------');

                let foundCount = 0;
                const foundVulns = [];

                addLog(`[INFO] Checking ${vulnerabilities.length} known vulnerabilities...`);

                vulnerabilities.forEach((vuln, index) => {
                    let vulnerable = false;
                    if (version >= vuln.min && version <= vuln.max) {
                        vulnerable = true;
                        foundCount++;
                        foundVulns.push(vuln);
                    }
                    const statusText = vulnerable ? 'VULNERABLE' : 'NOT VULNERABLE';
                    const line = `${vuln.name} [${vuln.cve}] ${vuln.min} - ${vuln.max} | ${vuln.type} | ${statusText}`;
                    setTimeout(() => {
                        addLog(line);
                    }, 30 + index * 25);
                });

                // После завершения
                setTimeout(() => {
                    addLog('------------------------------------------------------------------');
                    addLog(`[RESULT] Vulnerabilities detected: ${foundCount} out of ${vulnerabilities.length}`);
                    addLog('------------------------------------------------------------------');

                    if (foundCount > 0) {
                        addLog('[FOUND VULNERABILITIES FOR THIS PS4]:');
                        foundVulns.forEach(v => {
                            addLog(` - ${v.name} (${v.cve}) | ${v.type} | ${v.min} - ${v.max}`);
                            addLog(`   [DESC] ${v.desc}`);
                            addLog(`   [EXPLOIT] ${v.exploit}`);
                            addLog('');
                        });
                    } else {
                        addLog('[FOUND VULNERABILITIES]: None.');
                    }

                    addLog('------------------------------------------------------------------');
                    addLog('[INFO] Scan completed.');
                    status.textContent = 'Scan complete.';
                    scanBtn.disabled = false;
                    isScanning = false;

                    // Вызов системного уведомления
                    const notifText = `Found ${foundCount} vulnerabilities on PS4 version ${version.toFixed(2)}.`;
                    showSystemNotification(notifText);

                }, 30 + vulnerabilities.length * 25 + 500);
            }

            scanBtn.addEventListener('click', startScan);

            // Инициализация
            if (version !== null) {
                addLog(`[INFO] PS4 version detected: ${version.toFixed(2)}. Model: ${model}. Ready.`);
                status.textContent = 'Press SCAN to check vulnerabilities.';
            } else {
                addLog('[ERROR] Could not detect PS4 version. Please restart the browser and try again.');
                status.textContent = 'Version detection failed.';
                scanBtn.disabled = true;
            }
        })();
    </script>
