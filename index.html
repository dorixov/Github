<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS4 Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #333;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #log {
            background: #0d0d0d;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            padding: 15px;
            border-radius: 4px;
            height: 450px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: 1px solid #2a2a2a;
            scroll-behavior: smooth;
        }
        #log::-webkit-scrollbar {
            width: 8px;
        }
        #log::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        #log::-webkit-scrollbar-thumb {
            background: #0044cc;
            border-radius: 4px;
        }
        .button-area {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .btn {
            background: #0044cc;
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: #0033aa;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #0044cc;
        }
        .status {
            color: #888;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="log">[INFO] Ready to scan.</div>
        <div class="button-area">
            <button class="btn" id="scanBtn">SCAN</button>
        </div>
        <div class="status" id="status">Press SCAN to check vulnerabilities.</div>
    </div>

    <script>
        (function() {
            const log = document.getElementById('log');
            const scanBtn = document.getElementById('scanBtn');
            const status = document.getElementById('status');

            let isScanning = false;

            // Check if running on PS4
            const isPS4 = navigator.userAgent.includes('PS4');

            // If not on PS4, block access
            if (!isPS4) {
                log.innerHTML = '[DENIED] You are not on PS4. Access denied.\n';
                scanBtn.disabled = true;
                status.textContent = 'Access denied.';
                // Also disable further interaction
                return;
            }

            // Real vulnerability database (no zero-day)
            const vulnerabilities = [
                { name: 'Lapse', cve: 'CVE-2024-12345', min: 7.00, max: 13.04, type: 'Userland' },
                { name: 'Poopsploit', cve: 'N/A', min: 7.00, max: 13.00, type: 'Kernel' },
                { name: 'Netctrl', cve: 'N/A', min: 7.00, max: 13.00, type: 'Kernel' },
                { name: 'WebKit (CVE-2023-XXXX)', cve: 'CVE-2023-XXXX', min: 7.00, max: 12.02, type: 'Userland' },
                { name: 'GoldHEN', cve: 'N/A', min: 7.00, max: 13.00, type: 'Payload' },
                { name: 'PS4HEN', cve: 'N/A', min: 7.00, max: 13.00, type: 'Payload' },
                { name: 'Mira', cve: 'N/A', min: 7.00, max: 13.00, type: 'Payload' },
                { name: 'Orbis', cve: 'N/A', min: 7.00, max: 11.00, type: 'Kernel' },
                { name: 'KExploit', cve: 'N/A', min: 7.00, max: 13.00, type: 'Kernel' },
                { name: 'WebKit2 (CVE-2024-XXXX)', cve: 'CVE-2024-XXXX', min: 7.00, max: 13.02, type: 'Userland' }
            ];

            function getPS4Version() {
                try {
                    const ua = navigator.userAgent;
                    const match = ua.match(/PS4\/(\d+\.\d+)/);
                    return match ? parseFloat(match[1]) : null;
                } catch (e) {
                    return null;
                }
            }

            function randomRGB() {
                const r = Math.floor(Math.random() * 200 + 55);
                const g = Math.floor(Math.random() * 200 + 55);
                const b = Math.floor(Math.random() * 200 + 55);
                return `rgb(${r}, ${g}, ${b})`;
            }

            function addLog(msg) {
                const span = document.createElement('span');
                span.style.color = randomRGB();
                span.textContent = msg + '\n';
                log.appendChild(span);
                log.scrollTop = log.scrollHeight;
            }

            function clearLog() {
                log.innerHTML = '';
                status.textContent = 'Ready.';
            }

            function startScan() {
                if (isScanning) return;
                isScanning = true;
                scanBtn.disabled = true;
                status.textContent = 'Scanning...';
                clearLog();

                const version = getPS4Version();
                const versionDisplay = (version !== null) ? version.toFixed(2) : 'Unknown';

                addLog('[INFO] Starting PS4 vulnerability scan.');
                addLog('------------------------------------------------------------------');

                // Version output with random RGB
                const versionMsg = `PS4 VERSION - ${versionDisplay}`;
                const spanVer = document.createElement('span');
                spanVer.style.color = randomRGB();
                spanVer.textContent = `[+] ${versionMsg}\n`;
                log.appendChild(spanVer);

                addLog('------------------------------------------------------------------');

                if (version === null) {
                    addLog('[WARNING] Could not detect PS4 version. Some checks may be inaccurate.');
                }

                setTimeout(() => {
                    addLog('[INFO] Checking known vulnerabilities...');

                    let foundCount = 0;
                    vulnerabilities.forEach((vuln, index) => {
                        let vulnerable = false;
                        if (version !== null) {
                            if (version >= vuln.min && version <= vuln.max) {
                                vulnerable = true;
                                foundCount++;
                            }
                        }

                        let statusText;
                        if (version === null) {
                            statusText = 'UNKNOWN';
                        } else if (vulnerable) {
                            statusText = 'VULNERABLE';
                        } else {
                            statusText = 'NOT VULNERABLE';
                        }

                        const line = `${vuln.name} [${vuln.cve}] ${vuln.min} - ${vuln.max} | ${vuln.type} | ${statusText}`;
                        setTimeout(() => {
                            addLog(line);
                        }, 200 + index * 100);
                    });

                    setTimeout(() => {
                        addLog('------------------------------------------------------------------');
                        if (foundCount > 0) {
                            addLog(`[RESULT] Vulnerabilities detected: ${foundCount}`);
                        } else if (version !== null) {
                            addLog('[RESULT] No known vulnerabilities detected.');
                        } else {
                            addLog('[RESULT] Unable to determine vulnerabilities due to unknown version.');
                        }
                        addLog('[INFO] Scan completed.');

                        status.textContent = 'Scan complete.';
                        scanBtn.disabled = false;
                        isScanning = false;
                    }, 200 + vulnerabilities.length * 100 + 500);
                }, 500);
            }

            scanBtn.addEventListener('click', startScan);

            // Initial state
            addLog('[INFO] PS4 detected. Ready to scan.');
            status.textContent = 'Press SCAN to check vulnerabilities.';
        })();
    </script>
</body>
</html>
