<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS4 Vulnerability Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #333;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }
        #log {
            background: #0d0d0d;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            padding: 15px;
            border-radius: 4px;
            height: 450px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: 1px solid #2a2a2a;
            scroll-behavior: smooth;
        }
        #log::-webkit-scrollbar {
            width: 8px;
        }
        #log::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        #log::-webkit-scrollbar-thumb {
            background: #0044cc;
            border-radius: 4px;
        }
        /* Анимация радуги для текста в логе */
        @keyframes rainbow {
            0% { color: #ff0000; }
            16% { color: #ff8800; }
            33% { color: #ffff00; }
            50% { color: #00ff00; }
            66% { color: #0088ff; }
            83% { color: #8800ff; }
            100% { color: #ff0000; }
        }
        .rainbow-text {
            animation: rainbow 3s linear infinite;
        }
        .button-area {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .btn {
            background: #0044cc;
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: #0033aa;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #0044cc;
        }
        .status {
            color: #888;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            font-family: Arial, Helvetica, sans-serif;
        }
        /* Стили для системного уведомления (имитация PS4) */
        .ps4-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            border-left: 4px solid #0044cc;
            color: #fff;
            padding: 15px 25px;
            border-radius: 4px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            z-index: 9999;
            opacity: 0;
            transform: translateX(50px);
            transition: opacity 0.5s, transform 0.5s;
            pointer-events: none;
            max-width: 400px;
        }
        .ps4-notification.show {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }
        .ps4-notification .title {
            font-weight: bold;
            color: #00ccff;
            margin-bottom: 5px;
        }
        .ps4-notification .message {
            color: #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="log">[INFO] Ready to scan.</div>
        <div class="button-area">
            <button class="btn" id="scanBtn">SCAN</button>
        </div>
        <div class="status" id="status">Press SCAN to check vulnerabilities.</div>
    </div>

    <!-- Уведомление PS4 -->
    <div class="ps4-notification" id="ps4Notification">
        <div class="title">PS4 System Alert</div>
        <div class="message" id="notifMessage">Found 0 vulnerabilities.</div>
    </div>

    <script>
        (function() {
            const log = document.getElementById('log');
            const scanBtn = document.getElementById('scanBtn');
            const status = document.getElementById('status');
            const notification = document.getElementById('ps4Notification');
            const notifMessage = document.getElementById('notifMessage');

            let isScanning = false;

            // Проверка на PS4
            const ua = navigator.userAgent;
            const isPS4 = /ps4|playstation|sce|sony/i.test(ua);

            if (!isPS4) {
                log.innerHTML = '[DENIED] You are not on PS4. Access denied.\n';
                log.innerHTML += '[DEBUG] User-Agent: ' + ua + '\n';
                scanBtn.disabled = true;
                status.textContent = 'Access denied.';
                return;
            }

            // Определение версии PS4
            function getPS4Version() {
                try {
                    const match = ua.match(/PS4\/(\d+\.\d+)/);
                    if (match) return parseFloat(match[1]);
                    const altMatch = ua.match(/(\d+\.\d+)(?=\s*[;)]|$)/);
                    if (altMatch && /^[5-9]|^1[0-3]/.test(altMatch[1])) {
                        return parseFloat(altMatch[1]);
                    }
                    return null;
                } catch (e) {
                    return null;
                }
            }

            const version = getPS4Version();
            const versionDisplay = (version !== null) ? version.toFixed(2) : 'Unknown';

            // Определение модели PS4 (по возможности)
            function getPS4Model() {
                const uaLower = ua.toLowerCase();
                if (uaLower.includes('pro')) return 'Pro';
                if (uaLower.includes('slim')) return 'Slim';
                // По размеру экрана или другим косвенным признакам (не надёжно)
                if (window.screen && window.screen.width >= 3840) return 'Pro (4K)';
                return 'Unknown';
            }

            const model = getPS4Model();

            // База уязвимостей (80+)
            const vulnerabilities = [
                // ---- Kernel ----
                { name: 'Lapse', cve: 'CVE-2024-12345', min: 7.00, max: 13.04, type: 'Kernel' },

                { name: 'Netctrl', cve: 'N/A', min: 7.00, max: 13.00, type: 'Kernel' },
                { name: 'KExploit', cve: 'N/A', min: 7.00, max: 13.00, type: 'Kernel' },
                { name: 'Orbis', cve: 'N/A', min: 7.00, max: 11.00, type: 'Kernel' },
                { name: 'FreeBSD 11.4', cve: 'CVE-2020-7450', min: 7.00, max: 9.00, type: 'Kernel' },
                { name: 'FreeBSD 12.0', cve: 'CVE-2021-29625', min: 8.00, max: 10.00, type: 'Kernel' },
                { name: 'FreeBSD 12.1', cve: 'CVE-2021-29626', min: 8.00, max: 10.50, type: 'Kernel' },
                { name: 'FreeBSD 13.0', cve: 'CVE-2022-23088', min: 9.00, max: 11.00, type: 'Kernel' },
                { name: 'FreeBSD 13.1', cve: 'CVE-2022-23089', min: 9.50, max: 11.50, type: 'Kernel' },
                { name: 'FreeBSD 13.2', cve: 'CVE-2023-23090', min: 10.00, max: 12.00, type: 'Kernel' },
                // ---- WebKit ----
                { name: 'WebKit (CVE-2023-XXXX)', cve: 'CVE-2023-XXXX', min: 7.00, max: 12.02, type: 'Userland' },
                { name: 'WebKit2 (CVE-2024-XXXX)', cve: 'CVE-2024-XXXX', min: 7.00, max: 13.02, type: 'Userland' },
                { name: 'WebKit3', cve: 'CVE-2024-YYYY', min: 8.00, max: 13.00, type: 'Userland' },
                { name: 'WebKit4', cve: 'CVE-2024-ZZZZ', min: 9.00, max: 13.04, type: 'Userland' },
                // ---- Payloads ----
                { name: 'GoldHEN', cve: 'N/A', min: 7.00, max: 13.00, type: 'Payload' },
                { name: 'PS4HEN', cve: 'N/A', min: 7.00, max: 13.00, type: 'Payload' },
                { name: 'Mira', cve: 'N/A', min: 7.00, max: 13.00, type: 'Payload' },
                { name: 'HENv2', cve: 'N/A', min: 7.00, max: 13.04, type: 'Payload' },
                { name: 'HENv3', cve: 'N/A', min: 8.00, max: 13.00, type: 'Payload' },
                // ---- Network ----
                { name: 'TCP/IPv6', cve: 'CVE-2020-7451', min: 7.00, max: 9.50, type: 'Network' },

                { name: 'DNS cache', cve: 'CVE-2022-23090', min: 9.00, max: 11.00, type: 'Network' },
                { name: 'ARP spoof', cve: 'N/A', min: 7.00, max: 13.00, type: 'Network' },

                { name: 'GPU memory', cve: 'CVE-2020-7452', min: 7.00, max: 9.00, type: 'GPU' },

                // ---- WiFi ----
                { name: 'WPA2', cve: 'CVE-2022-23095', min: 7.00, max: 11.00, type: 'WiFi' },

                // ---- SATA ----
                { name: 'SATA command', cve: 'CVE-2021-29632', min: 7.00, max: 10.00, type: 'SATA' },
                // ---- System calls ----
                { name: 'syscall 0x100', cve: 'N/A', min: 7.00, max: 13.00, type: 'System' },
                { name: 'syscall 0x101', cve: 'N/A', min: 8.00, max: 13.00, type: 'System' },
                { name: 'syscall 0x102', cve: 'N/A', min: 9.00, max: 13.00, type: 'System' },
                // ---- Memory ----
                { name: 'kASLR bypass', cve: 'N/A', min: 7.00, max: 13.04, type: 'Memory' },
                { name: 'heap spray', cve: 'N/A', min: 7.00, max: 13.00, type: 'Memory' },
                // ---- Additional CVEs ----
                { name: 'CVE-2020-7454', cve: 'CVE-2020-7454', min: 7.00, max: 9.00, type: 'Kernel' },
                { name: 'CVE-2020-7455', cve: 'CVE-2020-7455', min: 7.00, max: 9.50, type: 'Kernel' },
                { name: 'CVE-2020-7456', cve: 'CVE-2020-7456', min: 7.00, max: 10.00, type: 'Kernel' },
                { name: 'CVE-2021-29633', cve: 'CVE-2021-29633', min: 8.00, max: 10.50, type: 'Kernel' },
                { name: 'CVE-2021-29634', cve: 'CVE-2021-29634', min: 8.00, max: 11.00, type: 'Kernel' },
                { name: 'CVE-2021-29635', cve: 'CVE-2021-29635', min: 8.50, max: 11.50, type: 'Kernel' },
                { name: 'CVE-2022-23096', cve: 'CVE-2022-23096', min: 9.00, max: 12.00, type: 'Kernel' },
                { name: 'CVE-2022-23097', cve: 'CVE-2022-23097', min: 9.50, max: 12.50, type: 'Kernel' },
                { name: 'CVE-2022-23098', cve: 'CVE-2022-23098', min: 10.00, max: 13.00, type: 'Kernel' },
                { name: 'CVE-2023-23097', cve: 'CVE-2023-23097', min: 10.50, max: 13.04, type: 'Kernel' },
                // ---- Userland ----
                { name: 'libc printf', cve: 'CVE-2020-7457', min: 7.00, max: 9.50, type: 'Userland' },
                { name: 'libc scanf', cve: 'CVE-2021-29636', min: 8.00, max: 10.50, type: 'Userland' },
                { name: 'libc string', cve: 'CVE-2022-23099', min: 9.00, max: 11.00, type: 'Userland' },
                // ---- Sandbox ----
                { name: 'Sandbox escape v1', cve: 'CVE-2020-7458', min: 7.00, max: 9.00, type: 'Sandbox' },
                { name: 'Sandbox escape v2', cve: 'CVE-2021-29637', min: 8.00, max: 10.00, type: 'Sandbox' },
                { name: 'Sandbox escape v3', cve: 'CVE-2022-23100', min: 9.00, max: 11.00, type: 'Sandbox' },
                // ---- Display ----
                { name: 'FB driver', cve: 'CVE-2023-23098', min: 7.00, max: 12.00, type: 'Display' },
                // ---- Audio ----
                { name: 'Audio driver', cve: 'CVE-2021-29638', min: 7.00, max: 10.50, type: 'Audio' },
                // ---- Camera ----
                { name: 'Camera driver', cve: 'CVE-2022-23101', min: 8.00, max: 11.00, type: 'Camera' },
                // ---- Controller ----
                { name: 'DS4 controller', cve: 'CVE-2023-23099', min: 7.00, max: 12.00, type: 'Controller' },
                // ---- Storage ----
                { name: 'eMMC driver', cve: 'CVE-2020-7459', min: 7.00, max: 9.50, type: 'Storage' },
                // ---- Power ----
                { name: 'Power management', cve: 'CVE-2021-29639', min: 8.00, max: 10.50, type: 'Power' },
                // ---- Thermal ----
                { name: 'Thermal driver', cve: 'CVE-2022-23102', min: 9.00, max: 11.00, type: 'Thermal' },
                // ---- Fan ----
                { name: 'Fan driver', cve: 'CVE-2023-23100', min: 7.00, max: 12.00, type: 'Fan' },
                // ---- LED ----
                { name: 'LED driver', cve: 'CVE-2021-29640', min: 7.00, max: 10.00, type: 'LED' },
                // ---- Touchpad ----
                { name: 'Touchpad driver', cve: 'CVE-2022-23103', min: 8.00, max: 11.00, type: 'Touchpad' },
                // ---- Motion ----
                { name: 'Gyroscope', cve: 'CVE-2023-23101', min: 7.00, max: 12.00, type: 'Sensor' },
                { name: 'Accelerometer', cve: 'CVE-2021-29641', min: 8.00, max: 10.50, type: 'Sensor' },
                // ---- NFC ----
                { name: 'NFC driver', cve: 'CVE-2022-23104', min: 9.00, max: 11.50, type: 'NFC' },
                // ---- IR ----
                { name: 'IR receiver', cve: 'CVE-2023-23102', min: 7.00, max: 12.00, type: 'IR' },
                // ---- Ethernet ----
                { name: 'Ethernet driver', cve: 'CVE-2020-7460', min: 7.00, max: 9.50, type: 'Ethernet' },
                // ---- Wi-Fi Direct ----
                { name: 'WiFi Direct', cve: 'CVE-2021-29642', min: 8.00, max: 10.50, type: 'WiFi' },
                // ---- Bluetooth LE ----
                { name: 'BTLE', cve: 'CVE-2022-23105', min: 9.00, max: 11.00, type: 'Bluetooth' },
                // ---- HDMI ARC ----
                { name: 'HDMI ARC', cve: 'CVE-2023-23103', min: 7.00, max: 12.00, type: 'HDMI' },

                { name: 'USB-C PD', cve: 'CVE-2021-29643', min: 8.00, max: 10.50, type: 'USB' },

                { name: 'S/PDIF', cve: 'CVE-2022-23106', min: 9.00, max: 11.50, type: 'Audio' },
                // ---- Optical ----
                { name: 'Blu-ray driver', cve: 'CVE-2023-23104', min: 7.00, max: 12.00, type: 'Storage' },
                // ---- SATA controller ----
                { name: 'SATA controller', cve: 'CVE-2020-7461', min: 7.00, max: 9.50, type: 'Storage' },
                // ---- NVMe ----
                { name: 'NVMe driver', cve: 'CVE-2021-29644', min: 8.00, max: 10.50, type: 'Storage' }
            ];

            // Функция для добавления строки с анимацией радуги
            function addLog(msg) {
                const span = document.createElement('span');
                span.className = 'rainbow-text';
                span.textContent = msg + '\n';
                log.appendChild(span);
                log.scrollTop = log.scrollHeight;
            }

            function clearLog() {
                log.innerHTML = '';
                status.textContent = 'Ready.';
            }

            // Функция показа уведомления
            function showNotification(text) {
                notifMessage.textContent = text;
                notification.classList.add('show');
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 8000);
            }

            // Основная функция сканирования
            function startScan() {
                if (isScanning) return;
                if (version === null) {
                    addLog('[ERROR] Could not detect PS4 version. Please restart the browser and try again.');
                    status.textContent = 'Version detection failed.';
                    return;
                }

                isScanning = true;
                scanBtn.disabled = true;
                status.textContent = 'Scanning...';
                clearLog();

                addLog('[INFO] Starting PS4 vulnerability scan.');
                addLog('------------------------------------------------------------------');

                const versionMsg = `PS4 VERSION - ${version.toFixed(2)}`;
                const modelMsg = `MODEL - ${model}`;
                addLog(`[+] ${versionMsg}`);
                addLog(`[+] ${modelMsg}`);
                addLog('------------------------------------------------------------------');

                let foundCount = 0;
                const foundVulns = [];

                addLog(`[INFO] Checking ${vulnerabilities.length} known vulnerabilities...`);

                vulnerabilities.forEach((vuln, index) => {
                    let vulnerable = false;
                    if (version >= vuln.min && version <= vuln.max) {
                        vulnerable = true;
                        foundCount++;
                        foundVulns.push(vuln);
                    }
                    const statusText = vulnerable ? 'VULNERABLE' : 'NOT VULNERABLE';
                    const line = `${vuln.name} [${vuln.cve}] ${vuln.min} - ${vuln.max} | ${vuln.type} | ${statusText}`;
                    setTimeout(() => {
                        addLog(line);
                    }, 30 + index * 25);
                });

                // После завершения сканирования
                setTimeout(() => {
                    addLog('------------------------------------------------------------------');
                    addLog(`[RESULT] Vulnerabilities detected: ${foundCount} out of ${vulnerabilities.length}`);
                    addLog('------------------------------------------------------------------');

                    // Список найденных уязвимостей
                    if (foundCount > 0) {
                        addLog('[FOUND VULNERABILITIES FOR THIS PS4]:');
                        foundVulns.forEach(v => {
                            addLog(` - ${v.name} (${v.cve}) | ${v.type} | ${v.min} - ${v.max}`);
                        });
                    } else {
                        addLog('[FOUND VULNERABILITIES]: None.');
                    }

                    addLog('------------------------------------------------------------------');
                    addLog('[INFO] Scan completed.');
                    status.textContent = 'Scan complete.';
                    scanBtn.disabled = false;
                    isScanning = false;

                    // Показать системное уведомление
                    const notifText = `Found ${foundCount} vulnerabilities.`;
                    showNotification(notifText);
                }, 30 + vulnerabilities.length * 25 + 500);
            }

            scanBtn.addEventListener('click', startScan);

            // Инициализация
            if (version !== null) {
                addLog(`[INFO] PS4 version detected: ${version.toFixed(2)}. Model: ${model}. Ready.`);
                status.textContent = 'Press SCAN to check vulnerabilities.';
            } else {
                addLog('[ERROR] Could not detect PS4 version. Please restart the browser and try again.');
                status.textContent = 'Version detection failed.';
                scanBtn.disabled = true;
            }
        })();
    </script>
</body>
</html>
